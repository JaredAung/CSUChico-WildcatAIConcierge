version = 0.1

[default.global.parameters]
stack_name = "wildcat-ai-concierge"
region = "us-west-2"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
region = "us-west-2"
parameter_overrides = "BedrockRegion=\"us-west-2\" BedrockKnowledgeBaseId=\"OVX32UKGE7\" BedrockModelArn=\"arn:aws:bedrock:us-west-2:039384756194:inference-profile/us.anthropic.claude-sonnet-5\" CorsAllowOrigin=\"*\""
s3_prefix = "wildcat-ai-concierge"
image_repositories = []

[default.local_start_api.parameters]
warm_containers = "EAGER"

AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Wildcat AI Concierge — API Gateway + Node.js Lambda + Bedrock Knowledge Base

Parameters:
  BedrockRegion:
    Type: String
    Default: us-west-2
    Description: Region where the Bedrock Knowledge Base is deployed
  BedrockKnowledgeBaseId:
    Type: String
    Description: Bedrock Knowledge Base ID
  BedrockModelArn:
    Type: String
    Description: Foundation model or inference-profile ARN used to generate answers
  CorsAllowOrigin:
    Type: String
    Default: '*'
    Description: Access-Control-Allow-Origin value for API responses

Globals:
  Function:
    Timeout: 29
    MemorySize: 512
    Runtime: nodejs20.x
    Architectures:
      - arm64
    Environment:
      Variables:
        BEDROCK_REGION: !Ref BedrockRegion
        BEDROCK_KNOWLEDGE_BASE_ID: !Ref BedrockKnowledgeBaseId
        BEDROCK_MODEL_ARN: !Ref BedrockModelArn
        CORS_ALLOW_ORIGIN: !Ref CorsAllowOrigin
        CONVERSE_MODEL_ID: anthropic.claude-3-haiku-20240307-v1:0

Resources:
  WildcatApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: Prod
      CorsConfiguration:
        AllowOrigins:
          - !Ref CorsAllowOrigin
        AllowHeaders:
          - Content-Type
          - Authorization
          - Accept
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        MaxAge: 600

  ChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: wildcat-ai-concierge-chat
      CodeUri: src/
      Handler: handler.handler
      Description: Chat + health endpoints backed by Bedrock Knowledge Base
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:RetrieveAndGenerate
                - bedrock:Retrieve
                - bedrock:InvokeModel
                - bedrock:Converse
                - bedrock:GetInferenceProfile
              Resource: '*'
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref WildcatApi
            Path: /api/v1/health
            Method: GET
        Chat:
          Type: HttpApi
          Properties:
            ApiId: !Ref WildcatApi
            Path: /api/v1/chat
            Method: POST
        OptionsProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref WildcatApi
            Path: /api/v1/{proxy+}
            Method: OPTIONS

Outputs:
  ApiEndpoint:
    Description: HTTP API base URL for frontend BACKEND_URL (includes /Prod)
    Value: !Sub '${WildcatApi.ApiEndpoint}/Prod'
  ChatUrl:
    Description: Chat endpoint
    Value: !Sub '${WildcatApi.ApiEndpoint}/Prod/api/v1/chat'
  HealthUrl:
    Description: Health endpoint
    Value: !Sub '${WildcatApi.ApiEndpoint}/Prod/api/v1/health'
